apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twitch-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JuniorZ-spec/Twitch-Clone-Project.git
    targetRevision: master
    path: k8s/twitch-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: twitch-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
