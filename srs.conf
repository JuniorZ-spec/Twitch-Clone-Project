listen              1935;
max_connections     1000;
srs_log_tank        console;

http_api {
  enabled         on;
  listen          1985;
  crossdomain     on;
}

http_server {
  enabled         on;
  listen          8080;
  dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
  enabled         on;
  hls {
    enabled         on;
    hls_path        ./objs/nginx/html;
    hls_fragment    10;
    hls_window      60;
  }
}
